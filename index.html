<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner Universal</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
padding:20px;
}

video{
width:100%;
max-width:400px;
border-radius:10px;
border:1px solid #ccc;
}

.result{
margin-top:20px;
padding:15px;
background:#f9fafb;
border-radius:8px;
border:1px solid #ddd;
}

</style>

</head>

<body>

<h2>Scanner de Código de Barras</h2>

<video id="video"></video>

<div id="resultado"></div>

<script>

const video = document.getElementById("video")
const resultado = document.getElementById("resultado")

let lastCode = ""

const hints = new Map()

hints.set(ZXingBrowser.DecodeHintType.TRY_HARDER, true)

const reader = new ZXingBrowser.BrowserMultiFormatReader(hints)

reader.decodeFromVideoDevice(null, video, (result, err) => {

if(result){

const codigo = result.text

if(codigo === lastCode) return

lastCode = codigo

mostrarProduto(codigo)

}

})

function mostrarProduto(codigo){

if(codigo === "7894900530025"){

resultado.innerHTML = `
<div class="result">
<h3>💧 Garrafa Água 1 Litro</h3>
Código: ${codigo}
</div>
`

}else{

resultado.innerHTML = `
<div class="result">
Produto não encontrado<br>
Código: ${codigo}
</div>
`

}

}

</script>

</body>
</html>
